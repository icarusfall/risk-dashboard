name: Nightly risk alert

on:
  schedule:
    # 22:00 UTC every day — after the US close.
    # GitHub Actions cron runs in UTC and may be delayed by a few minutes
    # under load; that's fine for a daily check.
    - cron: "0 22 * * *"
  # Allow manual runs from the Actions tab for debugging.
  workflow_dispatch:

jobs:
  check-risk:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /cron/check-risk endpoint
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing DASHBOARD_URL or CRON_SECRET repo secret." >&2
            exit 1
          fi

          # Strip any trailing slash so we don't double up on the path.
          base="${DASHBOARD_URL%/}"
          url="${base}/cron/check-risk?key=${CRON_SECRET}"

          echo "Calling: ${base}/cron/check-risk?key=***"

          # --fail-with-body: non-2xx exits non-zero AND prints the body.
          # --max-time: total cap so a hung response doesn't drag the run.
          response=$(curl --silent --show-error --fail-with-body --max-time 60 "$url")

          echo "Response:"
          echo "$response"
